<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parabens Tonini</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial;
}

/* Tela inicial */
#start {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  cursor: pointer;
}

#start h1 {
  font-size: 22px;
  margin-bottom: 10px;
  text-align: center;
}

#start p {
  font-size: 14px;
  opacity: 0.7;
}

/* Vídeo */
video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- Tela inicial -->
<div id="start" onclick="playVideo()">
  <h1>▶ Toque para assistir</h1>
  <p>Ativar som e iniciar vídeo</p>
</div>

<!-- Vídeo -->
<video id="video" playsinline>
  <source src="teste.mp4" type="video/mp4">
</video>

<script>
function playVideo() {
  const video = document.getElementById('video');
  const start = document.getElementById('start');

  start.style.display = "none";
  video.play();
}

// clique no vídeo = play/pause em qualquer momento
document.addEventListener("DOMContentLoaded", () => {
  const video = document.getElementById('video');

  video.addEventListener("click", () => {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  });
});
</script>

</body>
</html>
